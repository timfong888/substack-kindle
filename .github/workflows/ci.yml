name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest
